<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Dark Pad 📝 Bro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #000000; color: #f1f5f9; font-family: system-ui, sans-serif; overflow-x: hidden; }
        
        /* Paleta Dark Note */
        .bg-dark-orange { background-color: #e67e22; color: #000000; }
        .bg-dark-blue   { background-color: #2980b9; color: #ffffff; }
        .bg-dark-green  { background-color: #27ae60; color: #000000; }
        .bg-dark-purple { background-color: #8e44ad; color: #ffffff; }
        .bg-dark-red    { background-color: #c0392b; color: #ffffff; }
        .bg-dark-gray   { background-color: #34495e; color: #ffffff; }

        /* Estilos Tarjeta Pequeña (Mosaico) */
        .note-grid-card { 
            border-radius: 1rem; 
            border: 1px solid rgba(255,255,255,0.03); 
            cursor: pointer; 
            transition: all 0.2s ease;
            display: flex; flex-col; justify-between;
        }
        .note-grid-card:active { transform: scale(0.97); }
        .is-pinned { border: 2px solid #e67e22 !important; }
        
        /* Estilos Modal (Zoom) */
        .modal-back { background: rgba(0,0,0,0.85); backdrop-blur: 10px; z-index: 100; }
        .modal-content { 
            border-radius: 1.5rem; 
            border: 1px solid rgba(255,255,255,0.1); 
            max-width: 500px; width: 90%; 
            max-height: 80vh; overflow-y: auto;
        }
        textarea { background: transparent; border: none; outline: none; width: 100%; resize: none; font-size: 1rem; font-weight: 500; color: inherit; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="notesApp()" x-init="init()" class="pb-20">

    <header class="p-5 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-xl z-50 border-b border-white/5">
        <div>
            <h1 class="text-2xl font-black text-orange-500 tracking-tighter">Dark Pad <span class="text-xs text-slate-500 font-medium">by Bro</span></h1>
            <p class="text-[9px] font-bold text-slate-600 uppercase tracking-[0.2em]" x-text="notas.length + ' bloques en mosaico'"></p>
        </div>
        
        <div class="relative flex items-center gap-2">
            <button @click="showSettings = !showSettings" class="bg-slate-800 p-3 rounded-xl text-slate-400">
                <span class="material-symbols-outlined text-xl">settings</span>
            </button>
            <button @click="nuevaNota('text')" class="bg-orange-600 p-3 rounded-xl shadow-lg shadow-orange-900/30">
                <span class="material-symbols-outlined text-black font-black text-xl">add_notes</span>
            </button>
        </div>
    </header>

    <div x-show="showSettings" x-transition x-cloak class="p-4 bg-slate-900 border-b border-white/5 space-y-3">
        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Copia de Seguridad (JSON)</p>
        <div class="flex gap-2">
            <button @click="exportarJSON()" class="flex-1 flex items-center justify-center gap-2 p-3 bg-blue-950 text-blue-300 rounded-lg text-xs font-bold border border-blue-800">
                <span class="material-symbols-outlined text-sm">download</span> Exportar
            </button>
            <label class="flex-1 flex items-center justify-center gap-2 p-3 bg-green-950 text-green-300 rounded-lg text-xs font-bold border border-green-800 cursor-pointer">
                <span class="material-symbols-outlined text-sm">upload</span> Importar
                <input type="file" class="hidden" accept=".json" @change="importarJSON($event)">
            </label>
        </div>
    </div>

    <main class="p-3 grid grid-cols-2 gap-3" x-show="notas.length > 0">
        <template x-for="(nota, index) in notasOrdenadas" :key="nota.id">
            <div class="note-grid-card p-4 h-36 relative" :class="[nota.estilo, nota.pinned ? 'is-pinned' : '']" @click="abrirNota(nota)">
                <div class="absolute top-2 right-2 flex gap-1 opacity-50">
                    <template x-if="nota.pinned"><span class="material-symbols-outlined text-xs">push_pin</span></template>
                    <template x-if="nota.locked"><span class="material-symbols-outlined text-xs">lock</span></template>
                </div>

                <div class="flex-grow overflow-hidden mb-2">
                    <template x-if="nota.tipo === 'text'">
                        <p class="text-xs font-medium leading-relaxed break-words" x-text="nota.texto.substring(0, 80) + (nota.texto.length > 80 ? '...' : '')"></p>
                    </template>
                    <template x-if="nota.tipo === 'check'">
                        <p class="text-xs font-bold leading-relaxed">Checklist: <span x-text="nota.items.length + ' ítems'"></span></p>
                    </template>
                </div>

                <div class="border-t border-black/5 pt-2 flex justify-between items-center opacity-60">
                    <span class="text-[9px] font-black uppercase" x-text="nota.fecha.split(' ')[0]"></span>
                    <span class="text-[9px] font-black uppercase" x-text="nota.fecha.split(' ')[1]"></span>
                </div>
            </div>
        </template>
    </main>

    <div x-show="notas.length === 0" x-cloak class="flex flex-col items-center justify-center py-40 opacity-15">
        <span class="material-symbols-outlined text-8xl">grid_view</span>
        <p class="font-black uppercase tracking-[0.3em] text-xs mt-4">Mosaico Vacío</p>
    </div>

    <div x-show="notaExpandida" x-transition x-cloak class="fixed inset-0 modal-back flex items-center justify-center p-4" @click.away="cerrarNota()">
        <div class="modal-content p-6 shadow-2xl space-y-4" :class="notaExpandida?.estilo">
            
            <div class="flex justify-between items-center border-b border-black/10 pb-3 mb-4 opacity-70">
                <span class="text-xs font-black uppercase" x-text="notaExpandida?.fecha"></span>
                <div class="flex gap-3">
                    <button @click="togglePin(notaExpandida.id)" :class="notaExpandida?.pinned ? 'opacity-100 scale-110' : ''">
                        <span class="material-symbols-outlined text-lg">push_pin</span>
                    </button>
                    <button @click="borrar(notaExpandida.id)">
                        <span class="material-symbols-outlined text-lg text-red-900">delete</span>
                    </button>
                    <button @click="cerrarNota()" class="ml-2 bg-black/10 p-1.5 rounded-full">
                        <span class="material-symbols-outlined text-lg">close</span>
                    </button>
                </div>
            </div>

            <div class="min-h-[200px]">
                <textarea x-model="notaExpandida.texto" @input.debounce.500ms="guardar()" placeholder="Escribe aquí..." class="h-full min-h-[150px]"></textarea>
            </div>
            
            <p class="text-center text-[9px] font-bold opacity-30 mt-4">Toca fuera para cerrar y guardar</p>
        </div>
    </div>

    <script>
        function notesApp() {
            return {
                notas: [],
                showSettings: false,
                notaExpandida: null, // Nota que está en zoom
                estilos: ['bg-dark-orange', 'bg-dark-blue', 'bg-dark-green', 'bg-dark-purple', 'bg-dark-red', 'bg-dark-gray'],
                
                init() {
                    const saved = localStorage.getItem('darkpad_bro_v1');
                    this.notas = saved ? JSON.parse(saved) : [];
                },

                nuevaNota(tipo) {
                    const estilo = this.estilos[Math.floor(Math.random() * this.estilos.length)];
                    const ahora = new Date();
                    const fecha = ahora.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'}) + ' ' + ahora.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
                    
                    const nueva = { id: Date.now(), tipo, texto: '', items: [], fecha, estilo, pinned: false, locked: false };
                    this.notas.unshift(nueva);
                    this.guardar();
                    this.abrirNota(nueva); // Abrir en grande al crearla
                },

                abrirNota(nota) { this.notaExpandida = nota; },
                cerrarNota() { this.notaExpandida = null; this.guardar(); },

                togglePin(id) { const n = this.notas.find(n => n.id === id); n.pinned = !n.pinned; this.guardar(); },
                
                borrar(id) {
                    if(confirm("¿Eliminar este bloque del Dark Pad?")) {
                        this.notas = this.notas.filter(n => n.id !== id);
                        this.cerrarNota();
                        this.guardar();
                    }
                },

                guardar() { localStorage.setItem('darkpad_bro_v1', JSON.stringify(this.notas)); },

                get notasOrdenadas() {
                    return [...this.notas].sort((a, b) => b.pinned - a.pinned || b.id - a.id);
                },

                // Lógica JSON
                exportarJSON() {
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.notas));
                    const down = document.createElement('a');
                    down.setAttribute("href", dataStr);
                    down.setAttribute("download", "DarkPad_Bro_Backup.json");
                    down.click();
                    this.showSettings = false;
                },
                importarJSON(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const importados = JSON.parse(e.target.result);
                            if (confirm(`¿Importar ${importados.length} notas? Esto sobrescribirá el mosaico actual.`)) {
                                this.notas = importados;
                                this.guardar();
                                this.showSettings = false;
                            }
                        } catch (err) { alert("Archivo JSON no válido."); }
                    };
                    reader.readAsText(file);
                }
            }
        }
    </script>
</body>
</html>
