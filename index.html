<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Dark Pad 📸 Bro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #000000; color: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; }
        .bg-dark-orange { background-color: #e67e22; color: #000000; }
        .bg-dark-blue   { background-color: #2980b9; color: #ffffff; }
        .bg-dark-green  { background-color: #27ae60; color: #000000; }
        .bg-dark-purple { background-color: #8e44ad; color: #ffffff; }
        .bg-dark-red    { background-color: #c0392b; color: #ffffff; }
        .bg-dark-gray   { background-color: #34495e; color: #ffffff; }
        .note-grid-card { border-radius: 1.2rem; border: 1px solid rgba(255,255,255,0.05); height: 160px; }
        .is-pinned { border: 2px solid #e67e22 !important; }
        textarea { font-size: 1.05rem !important; font-weight: 500; line-height: 1.5; color: inherit; }
        .btn-icon-md { font-size: 1.5rem !important; }
        .modal-content { border-radius: 1.8rem; width: 92%; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body x-data="notesApp()" x-init="init()" class="pb-24">

    <header class="p-5 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-xl z-50 border-b border-white/10">
        <div>
            <h1 class="text-2xl font-black text-orange-500 tracking-tighter">Dark Pad</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">By Bro</p>
        </div>
        <div class="flex gap-3">
            <label class="bg-blue-600 p-3.5 rounded-xl shadow-lg cursor-pointer active:scale-90 transition-all">
                <span class="material-symbols-outlined text-white font-bold btn-icon-md">photo_camera</span>
                <input type="file" class="hidden" accept="image/*" capture="environment" @change="tomarFoto($event)">
            </label>
            <button @click="nuevaNota('text')" class="bg-orange-600 p-3.5 rounded-xl shadow-lg active:scale-90 transition-all">
                <span class="material-symbols-outlined text-black font-bold btn-icon-md">add_notes</span>
            </button>
        </div>
    </header>

    <main class="p-3 grid grid-cols-2 gap-3">
        <template x-for="nota in notasOrdenadas" :key="nota.id">
            <div class="note-grid-card p-4 flex flex-col justify-between relative" :class="[nota.estilo, nota.pinned ? 'is-pinned' : '']" @click="abrirNota(nota)">
                <template x-if="nota.reminder">
                    <div class="absolute top-2 right-2 text-red-800 animate-pulse">
                        <span class="material-symbols-outlined text-sm">notifications_active</span>
                    </div>
                </template>
                <div class="overflow-hidden flex-grow">
                    <template x-if="nota.foto">
                        <img :src="nota.foto" class="w-full h-20 object-cover rounded-lg mb-2 opacity-90">
                    </template>
                    <p class="text-xs font-bold leading-tight" x-text="nota.texto.substring(0, 60) + (nota.texto.length > 60 ? '...' : '')"></p>
                </div>
                <div class="mt-2 pt-2 border-t border-black/5 flex justify-between items-center text-[0.75rem] font-bold opacity-60">
                    <span x-text="nota.fecha.split(' ')[1]"></span>
                    <template x-if="nota.pinned"><span class="material-symbols-outlined text-xs">push_pin</span></template>
                </div>
            </div>
        </template>
    </main>

    <div x-show="notaExpandida" x-transition x-cloak class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="modal-content p-6 shadow-2xl space-y-5" :class="notaExpandida?.estilo" @click.away="cerrarNota()">
            <div class="flex justify-between items-center border-b border-black/10 pb-3">
                <span class="text-[0.75rem] font-bold uppercase" x-text="notaExpandida?.fecha"></span>
                <div class="flex gap-5">
                    <button @click="togglePin(notaExpandida.id)" :class="notaExpandida?.pinned ? 'scale-110' : 'opacity-30'">
                        <span class="material-symbols-outlined btn-icon-md">push_pin</span>
                    </button>
                    <button @click="toggleReminder(notaExpandida.id)" :class="notaExpandida?.reminder ? 'text-red-800 scale-110' : 'opacity-30'">
                        <span class="material-symbols-outlined btn-icon-md">notifications</span>
                    </button>
                    <button @click="borrar(notaExpandida.id)" class="opacity-30">
                        <span class="material-symbols-outlined btn-icon-md">delete</span>
                    </button>
                    <button @click="cerrarNota()" class="bg-black/10 p-1.5 rounded-full">
                        <span class="material-symbols-outlined btn-icon-md">close</span>
                    </button>
                </div>
            </div>
            <div class="space-y-4">
                <template x-if="notaExpandida?.foto">
                    <img :src="notaExpandida.foto" class="w-full rounded-xl shadow-md">
                </template>
                <textarea x-model="notaExpandida.texto" @input.debounce.500ms="guardar()" placeholder="Escribe..." class="min-h-[200px]"></textarea>
            </div>
        </div>
    </div>

    <script>
        function notesApp() {
            return {
                notas: [], notaExpandida: null,
                estilos: ['bg-dark-orange', 'bg-dark-blue', 'bg-dark-green', 'bg-dark-purple', 'bg-dark-red', 'bg-dark-gray'],
                init() {
                    this.notas = JSON.parse(localStorage.getItem('darkpad_bro_v4') || '[]');
                    if (Notification.permission !== "granted") {
                        Notification.requestPermission();
                    }
                },
                nuevaNota(tipo, fotoUrl = null) {
                    const ahora = new Date();
                    const fecha = ahora.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'}) + ' ' + ahora.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
                    const nueva = { id: Date.now(), tipo, texto: tipo==='text'?'':'FOTO CAPTURADA', foto: fotoUrl, fecha, estilo: this.estilos[Math.floor(Math.random() * this.estilos.length)], pinned: false, reminder: false };
                    this.notas.unshift(nueva);
                    this.guardar();
                    if(tipo === 'text') this.abrirNota(nueva);
                },
                async tomarFoto(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => { this.nuevaNota('image', e.target.result); };
                    reader.readAsDataURL(file);
                },
                abrirNota(nota) { this.notaExpandida = nota; },
                cerrarNota() { this.notaExpandida = null; this.guardar(); },
                togglePin(id) { const n = this.notas.find(n => n.id === id); n.pinned = !n.pinned; this.guardar(); },
                toggleReminder(id) { 
                    const n = this.notas.find(n => n.id === id); 
                    n.reminder = !n.reminder; 
                    if (n.reminder && Notification.permission === "granted") {
                        new Notification("Dark Pad: Recordatorio activo", {
                            body: n.texto || "Tienes una nota pendiente",
                            icon: "https://cdn-icons-png.flaticon.com/512/564/564445.png"
                        });
                    }
                    this.guardar(); 
                },
                borrar(id) { if(confirm("¿Borrar?")) { this.notas = this.notas.filter(n => n.id !== id); this.cerrarNota(); } },
                guardar() { localStorage.setItem('darkpad_bro_v4', JSON.stringify(this.notas)); },
                get notasOrdenadas() { return [...this.notas].sort((a, b) => b.pinned - a.pinned || b.id - a.id); }
            }
        }
    </script>
</body>
</html>
