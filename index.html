<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Dark Pad Pro • Bro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #000000; color: #ffffff; font-family: system-ui, sans-serif; overflow-x: hidden; }
        
        /* Colores de las notas aleatorios (Versión Mate) */
        .bg-dark-orange { background-color: #5d340b; } 
        .bg-dark-blue   { background-color: #153e5a; }
        .bg-dark-green  { background-color: #145a32; }
        .bg-dark-purple { background-color: #3b1c4a; }
        .bg-dark-red    { background-color: #641e16; }
        .bg-dark-gray   { background-color: #1c2833; }

        /* Mosaico */
        .note-card { border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); height: 150px; }

        /* Editor 100% Negro (Sin blanco) */
        .editor-container { background-color: #000000 !important; }
        textarea { 
            background: #000000 !important; 
            color: #ffffff !important; 
            font-size: 1.15rem; 
            width: 100%; 
            height: 70vh; 
            border: none; 
            outline: none; 
            padding: 1rem;
            resize: none;
        }

        /* Botones Abajo a la Derecha */
        .fab-container { 
            position: fixed; 
            bottom: 30px; 
            right: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            z-index: 100; 
        }
        .btn-fab { 
            width: 70px; 
            height: 70px; 
            border-radius: 22px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.1);
        }

        .scanning-loader { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body x-data="notesApp()" x-init="init()" class="pb-32">

    <header class="p-6 text-left border-b border-white/10 sticky top-0 bg-black/90 backdrop-blur-md z-50">
        <h1 class="text-2xl font-black text-orange-500 tracking-tighter uppercase">Dark Pad</h1>
        <p class="text-[10px] font-bold text-slate-500">SCANNER MODE</p>
    </header>

    <div x-show="isScanning" x-cloak class="fixed top-20 left-0 right-0 bg-blue-600 text-white text-center py-2 font-black text-xs z-[60] animate-pulse">
        ESCANEANDO... ESPERA UN MOMENTO
    </div>

    <main class="p-4 grid grid-cols-2 gap-4">
        <template x-for="nota in notas" :key="nota.id">
            <div @click="abrirNota(nota)" class="note-card p-5 flex flex-col justify-between shadow-lg" :class="nota.estilo">
                <p class="text-[0.9rem] font-bold leading-tight line-clamp-4" x-text="nota.texto || 'Nota vacía'"></p>
                <div class="flex justify-between items-center mt-2 opacity-40">
                    <span class="text-[10px] font-bold" x-text="nota.fecha"></span>
                    <template x-if="nota.reminder">
                        <span class="material-symbols-outlined text-sm text-red-400">notifications_active</span>
                    </template>
                </div>
            </div>
        </template>
    </main>

    <div class="fab-container">
        <label class="btn-fab bg-blue-700 active:scale-90 transition-all cursor-pointer">
            <span class="material-symbols-outlined text-white text-3xl" x-show="!isScanning">document_scanner</span>
            <span class="material-symbols-outlined text-white text-3xl scanning-loader" x-show="isScanning">sync</span>
            <input type="file" class="hidden" accept="image/*" capture="environment" @change="escanearTexto($event)">
        </label>
        <button @click="nuevaNota()" class="btn-fab bg-orange-600 active:scale-90 transition-all">
            <span class="material-symbols-outlined text-black font-black text-4xl">add</span>
        </button>
    </div>

    <div x-show="notaExpandida" x-transition x-cloak class="fixed inset-0 editor-container z-[200] flex flex-col">
        <div class="flex justify-between items-center p-6 border-b border-white/10">
            <div class="flex gap-8">
                <button @click="toggleReminder()" :class="notaExpandida?.reminder ? 'text-red-500 scale-125' : 'text-white opacity-40'">
                    <span class="material-symbols-outlined text-3xl">notifications</span>
                </button>
                <button @click="borrarNota()" class="text-white opacity-40">
                    <span class="material-symbols-outlined text-3xl">delete</span>
                </button>
            </div>
            <button @click="cerrarNota()" class="bg-white/10 px-5 py-2 rounded-xl font-black text-sm">LISTO</button>
        </div>
        
        <div class="p-2 flex-grow" :class="notaExpandida?.estilo + ' bg-opacity-10'">
            <textarea x-model="notaExpandida.texto" @input.debounce.500ms="guardar()" placeholder="Escribe o corrige aquí..."></textarea>
        </div>
    </div>

    <script>
        function notesApp() {
            return {
                notas: [],
                notaExpandida: null,
                isScanning: false,
                estilos: ['bg-dark-orange', 'bg-dark-blue', 'bg-dark-green', 'bg-dark-purple', 'bg-dark-red', 'bg-dark-gray'],
                
                init() {
                    this.notas = JSON.parse(localStorage.getItem('darkpad_v7') || '[]');
                    if (Notification.permission === "default") { Notification.requestPermission(); }
                },

                nuevaNota(textoInicial = '') {
                    const nueva = { 
                        id: Date.now(), 
                        texto: textoInicial, 
                        fecha: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), 
                        estilo: this.estilos[Math.floor(Math.random() * 6)], 
                        reminder: false 
                    };
                    this.notas.unshift(nueva);
                    this.guardar();
                    this.abrirNota(nueva);
                },

                async escanearTexto(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    this.isScanning = true;
                    try {
                        const result = await Tesseract.recognize(file, 'spa');
                        this.nuevaNota(result.data.text.trim());
                    } catch (e) {
                        alert("Error al leer el texto");
                    } finally {
                        this.isScanning = false;
                        event.target.value = '';
                    }
                },

                abrirNota(n) { this.notaExpandida = n; },
                cerrarNota() { this.notaExpandida = null; this.guardar(); },
                
                toggleReminder() { 
                    this.notaExpandida.reminder = !this.notaExpandida.reminder;
                    if(this.notaExpandida.reminder && Notification.permission === "granted") {
                        new Notification("Dark Pad: Nota Activa", { 
                            body: this.notaExpandida.texto || "Tienes una nota pendiente arriba",
                            icon: "https://cdn-icons-png.flaticon.com/512/564/564445.png",
                            tag: 'note-' + this.notaExpandida.id,
                            requireInteraction: true // Esto hace que se quede arriba
                        });
                    }
                },

                borrarNota() {
                    if(confirm("¿Eliminar esta nota?")) {
                        this.notas = this.notas.filter(n => n.id !== this.notaExpandida.id);
                        this.cerrarNota();
                    }
                },

                guardar() { localStorage.setItem('darkpad_v7', JSON.stringify(this.notas)); }
            }
        }
    </script>
</body>
</html>
