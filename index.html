<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Dark Pad 📝 Menorca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #000000; color: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
        .note-card { border-radius: 1.5rem; transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.03); }
        .bg-dark-orange { background-color: #e67e22; color: #000000; }
        .bg-dark-blue   { background-color: #2980b9; color: #ffffff; }
        .bg-dark-green  { background-color: #27ae60; color: #000000; }
        .bg-dark-purple { background-color: #8e44ad; color: #ffffff; }
        .bg-dark-red    { background-color: #c0392b; color: #ffffff; }
        .bg-dark-gray   { background-color: #2c3e50; color: #ffffff; }
        .is-pinned { border: 2px solid #e67e22 !important; box-shadow: 0 10px 30px -10px rgba(230, 126, 34, 0.3); }
        textarea { background: transparent; border: none; outline: none; width: 100%; resize: none; font-size: 1.05rem; font-weight: 500; }
        .menu-plus { background: rgba(20, 20, 20, 0.98); backdrop-blur: 20px; border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; }
    </style>
</head>
<body x-data="notesApp()" x-init="init()" class="pb-32">

    <header class="p-6 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-xl z-50 border-b border-white/5">
        <div>
            <h1 class="text-3xl font-black text-orange-500 tracking-tighter">Dark Pad</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]" x-text="notas.length + ' bloques'"></p>
        </div>
        
        <div class="relative">
            <button @click="showMenu = !showMenu" class="bg-orange-600 p-4 rounded-2xl shadow-xl active:scale-90 transition-all">
                <span class="material-symbols-outlined text-black font-black text-2xl" x-text="showMenu ? 'close' : 'menu'"></span>
            </button>
            
            <div x-show="showMenu" @click.away="showMenu = false" x-transition x-cloak class="absolute right-0 mt-4 w-56 menu-plus p-2 shadow-2xl z-50">
                <p class="px-4 py-2 text-[9px] font-black text-slate-500 uppercase border-b border-white/5 mb-1">Nueva Entrada</p>
                <button @click="nuevaNota('text')" class="w-full flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl text-sm font-black text-white transition-colors">
                    <span class="material-symbols-outlined text-orange-500">sticky_note</span> NOTA
                </button>
                <button @click="nuevaNota('check')" class="w-full flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl text-sm font-black text-white transition-colors">
                    <span class="material-symbols-outlined text-orange-500">checklist</span> CHECKLIST
                </button>
                
                <p class="px-4 py-2 text-[9px] font-black text-slate-500 uppercase border-y border-white/5 my-1">Copia de Seguridad (JSON)</p>
                <button @click="exportarJSON()" class="w-full flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl text-sm font-black text-blue-400 transition-colors">
                    <span class="material-symbols-outlined">download</span> EXPORTAR DATOS
                </button>
                <label class="w-full flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl text-sm font-black text-green-400 transition-colors cursor-pointer">
                    <span class="material-symbols-outlined">upload</span> RESTAURAR COPIA
                    <input type="file" class="hidden" accept=".json" @change="importarJSON($event)">
                </label>
            </div>
        </div>
    </header>

    <main class="p-4 flex flex-col gap-5">
        <template x-for="(nota, index) in notasOrdenadas" :key="nota.id">
            <div class="note-card p-6" :class="[nota.estilo, nota.pinned ? 'is-pinned' : '']">
                
                <div class="flex justify-between items-center mb-4 border-b border-black/5 pb-3">
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-black uppercase tracking-wider opacity-60" x-text="nota.fecha"></span>
                        <template x-if="nota.reminder"><span class="material-symbols-outlined text-[16px] text-red-800 animate-bounce">notifications_active</span></template>
                    </div>
                    
                    <div class="flex gap-4 opacity-40 hover:opacity-100 transition-opacity">
                        <button @click="togglePin(nota.id)" :class="nota.pinned ? 'opacity-100' : ''"><span class="material-symbols-outlined text-xl">push_pin</span></button>
                        <button @click="toggleLock(nota.id)"><span class="material-symbols-outlined text-xl" x-text="nota.locked ? 'lock' : 'lock_open'"></span></button>
                        <button @click="toggleReminder(nota.id)" :class="nota.reminder ? 'text-red-900' : ''"><span class="material-symbols-outlined text-xl">notifications</span></button>
                        <button @click="borrar(nota.id)"><span class="material-symbols-outlined text-xl">delete</span></button>
                    </div>
                </div>

                <div :class="nota.locked ? 'pointer-events-none opacity-80' : ''">
                    <template x-if="nota.tipo === 'text'">
                        <textarea x-model="nota.texto" @input.debounce.500ms="guardar()" placeholder="..." class="min-h-[100px]" :style="{ color: 'inherit' }"></textarea>
                    </template>
                    <template x-if="nota.tipo === 'check'">
                        <div class="space-y-3">
                            <template x-for="(item, iIdx) in nota.items" :key="iIdx">
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" x-model="item.done" @change="guardar()" class="w-5 h-5 accent-black">
                                    <input type="text" x-model="item.txt" @input.debounce.500ms="guardar()" class="bg-transparent border-none outline-none flex-grow font-bold text-sm" :class="item.done ? 'line-through opacity-30' : ''" :style="{ color: 'inherit' }">
                                </div>
                            </template>
                            <button @click="addCheckItem(nota.id)" class="text-[10px] font-black uppercase mt-2 opacity-50">+ Añadir</button>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </main>

    <script>
        function notesApp() {
            return {
                notas: [],
                showMenu: false,
                estilos: ['bg-dark-orange', 'bg-dark-blue', 'bg-dark-green', 'bg-dark-purple', 'bg-dark-red', 'bg-dark-gray'],
                
                init() {
                    const saved = localStorage.getItem('darkpad_v2');
                    this.notas = saved ? JSON.parse(saved) : [];
                },

                nuevaNota(tipo) {
                    const estilo = this.estilos[Math.floor(Math.random() * this.estilos.length)];
                    const ahora = new Date();
                    const fecha = ahora.toLocaleDateString('es-ES') + ' ' + ahora.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
                    this.notas.unshift({ id: Date.now(), tipo, texto: '', items: tipo === 'check' ? [{txt: '', done: false}] : [], fecha, estilo, pinned: false, locked: false, reminder: false });
                    this.showMenu = false;
                    this.guardar();
                },

                exportarJSON() {
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.notas));
                    const downloadAnchorNode = document.createElement('a');
                    downloadAnchorNode.setAttribute("href", dataStr);
                    downloadAnchorNode.setAttribute("download", "DarkPad_Backup.json");
                    document.body.appendChild(downloadAnchorNode);
                    downloadAnchorNode.click();
                    downloadAnchorNode.remove();
                },

                importarJSON(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const importados = JSON.parse(e.target.result);
                            if (confirm(`¿Importar ${importados.length} notas? Esto borrará las actuales.`)) {
                                this.notas = importados;
                                this.guardar();
                                this.showMenu = false;
                            }
                        } catch (err) { alert("Archivo no válido"); }
                    };
                    reader.readAsText(file);
                },

                addCheckItem(id) { this.notas.find(n => n.id === id).items.push({txt: '', done: false}); this.guardar(); },
                togglePin(id) { const n = this.notas.find(n => n.id === id); n.pinned = !n.pinned; this.guardar(); },
                toggleLock(id) { const n = this.notas.find(n => n.id === id); n.locked = !n.locked; this.guardar(); },
                toggleReminder(id) { const n = this.notas.find(n => n.id === id); n.reminder = !n.reminder; this.guardar(); },
                borrar(id) { if(confirm("¿Borrar?")) { this.notas = this.notas.filter(n => n.id !== id); this.guardar(); } },
                guardar() { localStorage.setItem('darkpad_v2', JSON.stringify(this.notas)); },
                get notasOrdenadas() { return [...this.notas].sort((a, b) => b.pinned - a.pinned || b.id - a.id); }
            }
        }
    </script>
</body>
</html>
