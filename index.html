<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Dark Pad Scan 🔎 Bro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #000000; color: #f1f5f9; font-family: system-ui, sans-serif; }
        
        /* Colores Dark Mate */
        .bg-dark-orange { background-color: #5d340b; } 
        .bg-dark-blue   { background-color: #153e5a; }
        .bg-dark-green  { background-color: #145a32; }
        .bg-dark-purple { background-color: #3b1c4a; }
        .bg-dark-red    { background-color: #641e16; }
        .bg-dark-gray   { background-color: #1c2833; }

        .note-grid-card { border-radius: 1.2rem; border: 1px solid rgba(255,255,255,0.08); height: 140px; overflow: hidden; }
        .is-pinned { border: 2px solid #e67e22 !important; }
        
        /* BLOQUE DE ESCRITURA OSCURO (Sin blanco) */
        textarea { 
            font-size: 1.1rem !important; 
            font-weight: 500; 
            line-height: 1.5; 
            color: #ffffff !important; 
            background: transparent !important; 
            width: 100%;
            height: 100%;
            border: none !important;
            outline: none !important;
            padding: 0;
        }

        .modal-content { border-radius: 2rem; width: 94%; max-height: 85vh; color: white; }
        .btn-icon-md { font-size: 1.8rem !important; }
        
        /* Animación de carga */
        .scanning-loader { animation: scan 1.5s infinite; }
        @keyframes scan { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body x-data="notesApp()" x-init="init()" class="pb-24">

    <header class="p-5 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-xl z-50 border-b border-white/10">
        <div>
            <h1 class="text-2xl font-black text-orange-500 tracking-tighter">Dark Pad</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Scanner Mode • Bro</p>
        </div>
        <div class="flex gap-4">
            <label class="bg-blue-700 p-4 rounded-2xl shadow-lg cursor-pointer active:scale-90 transition-all flex items-center">
                <span class="material-symbols-outlined text-white font-bold btn-icon-md" x-show="!isScanning">document_scanner</span>
                <span class="material-symbols-outlined text-white font-bold btn-icon-md scanning-loader" x-show="isScanning">sync</span>
                <input type="file" class="hidden" accept="image/*" capture="environment" @change="escanearTexto($event)">
            </label>
            <button @click="nuevaNota('text')" class="bg-orange-600 p-4 rounded-2xl shadow-lg active:scale-90 transition-all">
                <span class="material-symbols-outlined text-black font-bold btn-icon-md">edit_note</span>
            </button>
        </div>
    </header>

    <div x-show="isScanning" x-cloak class="fixed top-24 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-2 rounded-full font-bold text-sm z-[60] shadow-2xl">
        Leyendo texto... espera un momento
    </div>

    <main class="p-3 grid grid-cols-2 gap-4">
        <template x-for="nota in notasOrdenadas" :key="nota.id">
            <div class="note-grid-card p-5 flex flex-col justify-between relative shadow-lg" :class="[nota.estilo, nota.pinned ? 'is-pinned' : '']" @click="abrirNota(nota)">
                <template x-if="nota.reminder">
                    <div class="absolute top-3 right-3 text-red-400 animate-pulse">
                        <span class="material-symbols-outlined text-sm">notifications_active</span>
                    </div>
                </template>
                <div class="overflow-hidden flex-grow">
                    <p class="text-[0.9rem] font-bold leading-snug text-white" x-text="nota.texto.substring(0, 60) + (nota.texto.length > 60 ? '...' : '')"></p>
                </div>
                <div class="mt-2 pt-2 border-t border-white/10 flex justify-between items-center text-[0.7rem] font-black uppercase opacity-50 text-white">
                    <span x-text="nota.fecha.split(' ')[1]"></span>
                    <template x-if="nota.pinned"><span class="material-symbols-outlined text-xs">push_pin</span></template>
                </div>
            </div>
        </template>
    </main>

    <div x-show="notaExpandida" x-transition x-cloak class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[100] flex items-center justify-center p-3">
        <div class="modal-content p-7 flex flex-col shadow-2xl" :class="notaExpandida?.estilo" @click.away="cerrarNota()">
            
            <div class="flex justify-between items-center border-b border-white/10 pb-4 mb-4">
                <span class="text-[0.7rem] font-black uppercase opacity-60" x-text="notaExpandida?.fecha"></span>
                <div class="flex gap-6">
                    <button @click="togglePin(notaExpandida.id)" :class="notaExpandida?.pinned ? 'text-orange-400' : 'opacity-40'">
                        <span class="material-symbols-outlined btn-icon-md">push_pin</span>
                    </button>
                    <button @click="toggleReminder(notaExpandida.id)" :class="notaExpandida?.reminder ? 'text-red-400' : 'opacity-40'">
                        <span class="material-symbols-outlined btn-icon-md">notifications</span>
                    </button>
                    <button @click="borrar(notaExpandida.id)" class="opacity-40">
                        <span class="material-symbols-outlined btn-icon-md">delete</span>
                    </button>
                    <button @click="cerrarNota()" class="bg-white/10 p-2 rounded-full">
                        <span class="material-symbols-outlined btn-icon-md">close</span>
                    </button>
                </div>
            </div>

            <div class="flex-grow flex flex-col">
                <textarea x-model="notaExpandida.texto" @input.debounce.500ms="guardar()" placeholder="ESCRIBE AQUÍ..." class="flex-grow min-h-[300px]"></textarea>
            </div>
        </div>
    </div>

    <script>
        function notesApp() {
            return {
                notas: [], 
                notaExpandida: null,
                isScanning: false,
                estilos: ['bg-dark-orange', 'bg-dark-blue', 'bg-dark-green', 'bg-dark-purple', 'bg-dark-red', 'bg-dark-gray'],
                
                init() {
                    this.notas = JSON.parse(localStorage.getItem('darkpad_bro_v5') || '[]');
                },

                nuevaNota(tipo, textoInicial = '') {
                    const ahora = new Date();
                    const fecha = ahora.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'}) + ' ' + ahora.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
                    
                    const nueva = { 
                        id: Date.now(), 
                        tipo, 
                        texto: textoInicial, 
                        fecha, 
                        estilo: this.estilos[Math.floor(Math.random() * this.estilos.length)], 
                        pinned: false, 
                        reminder: false 
                    };
                    
                    this.notas.unshift(nueva);
                    this.guardar();
                    this.abrirNota(nueva); // Se abre siempre (Opción A)
                },

                async escanearTexto(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    this.isScanning = true;
                    
                    try {
                        const result = await Tesseract.recognize(file, 'spa', {
                            logger: m => console.log(m) 
                        });
                        
                        const textoEscaneado = result.data.text.trim();
                        this.nuevaNota('text', textoEscaneado || '[No se detectó texto]');
                    } catch (error) {
                        alert("Error al escanear. Inténtalo de nuevo.");
                        console.error(error);
                    } finally {
                        this.isScanning = false;
                        event.target.value = ''; // Reset input
                    }
                },

                abrirNota(nota) { this.notaExpandida = nota; },
                cerrarNota() { this.notaExpandida = null; this.guardar(); },
                togglePin(id) { const n = this.notas.find(n => n.id === id); n.pinned = !n.pinned; this.guardar(); },
                toggleReminder(id) { 
                    const n = this.notas.find(n => n.id === id); 
                    n.reminder = !n.reminder; 
                    if (n.reminder && Notification.permission === "granted") {
                        new Notification("Dark Pad", { body: n.texto || "Recordatorio" });
                    }
                    this.guardar(); 
                },
                borrar(id) { if(confirm("¿Borrar?")) { this.notas = this.notas.filter(n => n.id !== id); this.cerrarNota(); } },
                guardar() { localStorage.setItem('darkpad_bro_v5', JSON.stringify(this.notas)); },
                get notasOrdenadas() { return [...this.notas].sort((a, b) => b.pinned - a.pinned || b.id - a.id); }
            }
        }
    </script>
</body>
</html>
