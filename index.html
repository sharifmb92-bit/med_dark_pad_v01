<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Dark Pad Pro • Bro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #000000; color: #ffffff; font-family: system-ui, sans-serif; }
        
        /* Colores Dark con personalidad */
        .bg-dark-orange { background-color: #5d340b; border-color: #8e4f10; } 
        .bg-dark-blue   { background-color: #153e5a; border-color: #1b5276; }
        .bg-dark-green  { background-color: #145a32; border-color: #197b44; }
        .bg-dark-purple { background-color: #3b1c4a; border-color: #55286a; }
        .bg-dark-red    { background-color: #641e16; border-color: #8a2a1e; }
        .bg-dark-gray   { background-color: #1c2833; border-color: #2e4053; }

        /* Mosaico elegante */
        .note-card { border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.05); height: 160px; transition: transform 0.2s; }
        .is-pinned { border: 2px solid #e67e22 !important; box-shadow: 0 0 15px rgba(230,126,34,0.3); }

        /* MODAL REDUCIDO (La Tarjeta Flotante) */
        .modal-card { 
            width: 90%; 
            max-width: 400px; 
            border-radius: 2.5rem; 
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        /* Editor inmersivo del color de la nota */
        textarea { 
            background: transparent !important; 
            color: #ffffff !important; 
            font-size: 1.2rem; 
            width: 100%; 
            height: 300px; 
            border: none; 
            outline: none; 
            padding: 1.5rem;
            resize: none;
            font-weight: 500;
        }

        /* Botones abajo a la derecha */
        .fab-container { position: fixed; bottom: 25px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .btn-fab { 
            width: 60px; height: 60px; border-radius: 1.2rem; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            backdrop-blur: 10px;
        }
    </style>
</head>
<body x-data="notesApp()" x-init="init()" class="pb-32">

    <header class="p-6 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-xl z-50 border-b border-white/5">
        <div>
            <h1 class="text-xl font-black text-orange-500 tracking-tighter uppercase">Dark Pad</h1>
            <p class="text-[9px] font-black text-slate-500 tracking-[0.2em]">BY BRO</p>
        </div>
        <div class="opacity-20">
            <span class="material-symbols-outlined">grid_view</span>
        </div>
    </header>

    <main class="p-4 grid grid-cols-2 gap-4">
        <template x-for="nota in notasOrdenadas" :key="nota.id">
            <div @click="abrirNota(nota)" class="note-card p-5 flex flex-col justify-between relative" :class="[nota.estilo, nota.pinned ? 'is-pinned' : '']">
                <p class="text-[0.95rem] font-bold leading-tight text-white/90 line-clamp-4" x-text="nota.texto || '...'"></p>
                <div class="flex justify-between items-center opacity-40">
                    <span class="text-[10px] font-black" x-text="nota.fecha"></span>
                    <template x-if="nota.pinned"><span class="material-symbols-outlined text-xs">push_pin</span></template>
                </div>
            </div>
        </template>
    </main>

    <div class="fab-container">
        <label class="btn-fab bg-blue-600/90 active:scale-90 transition-all cursor-pointer">
            <span class="material-symbols-outlined text-white text-3xl" x-show="!isScanning">document_scanner</span>
            <span class="material-symbols-outlined text-white text-3xl animate-spin" x-show="isScanning">sync</span>
            <input type="file" class="hidden" accept="image/*" capture="environment" @change="escanearTexto($event)">
        </label>
        <button @click="nuevaNota()" class="btn-fab bg-orange-600 active:scale-90 transition-all">
            <span class="material-symbols-outlined text-black font-bold text-4xl">add</span>
        </button>
    </div>

    <div x-show="notaExpandida" x-transition.opacity x-cloak class="fixed inset-0 bg-black/90 backdrop-blur-md z-[200] flex items-center justify-center p-4">
        <div class="modal-card flex flex-col" :class="notaExpandida?.estilo" @click.away="cerrarNota()">
            
            <div class="flex justify-between items-center px-6 py-4 border-b border-white/10">
                <div class="flex gap-6">
                    <button @click="togglePin()" :class="notaExpandida?.pinned ? 'text-orange-400' : 'text-white/40'">
                        <span class="material-symbols-outlined text-2xl">push_pin</span>
                    </button>
                    <button @click="toggleReminder()" :class="notaExpandida?.reminder ? 'text-red-400 animate-pulse' : 'text-white/40'">
                        <span class="material-symbols-outlined text-2xl">notifications</span>
                    </button>
                </div>
                <button @click="cerrarNota()" class="bg-black/20 text-white w-10 h-10 rounded-full flex items-center justify-center">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <div class="flex-grow">
                <textarea x-model="notaExpandida.texto" @input.debounce.500ms="guardar()" placeholder="Escribe aquí..."></textarea>
            </div>

            <div class="px-6 py-3 flex justify-between items-center bg-black/10 text-[10px] font-black opacity-40 uppercase">
                <span x-text="notaExpandida?.fecha"></span>
                <button @click="borrarNota()" class="text-white/60">Eliminar</button>
            </div>
        </div>
    </div>

    <script>
        function notesApp() {
            return {
                notas: [],
                notaExpandida: null,
                isScanning: false,
                estilos: ['bg-dark-orange', 'bg-dark-blue', 'bg-dark-green', 'bg-dark-purple', 'bg-dark-red', 'bg-dark-gray'],
                
                init() {
                    this.notas = JSON.parse(localStorage.getItem('darkpad_v8_bro') || '[]');
                    if (Notification.permission === "default") { Notification.requestPermission(); }
                },

                nuevaNota(textoInicial = '') {
                    const ahora = new Date();
                    const fecha = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ' • ' + ahora.toLocaleDateString([], {day:'2-digit', month:'2-digit'});
                    const nueva = { 
                        id: Date.now(), 
                        texto: textoInicial, 
                        fecha: fecha, 
                        estilo: this.estilos[Math.floor(Math.random() * 6)], 
                        pinned: false, 
                        reminder: false 
                    };
                    this.notas.unshift(nueva);
                    this.guardar();
                    this.abrirNota(nueva);
                },

                async escanearTexto(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    this.isScanning = true;
                    try {
                        const result = await Tesseract.recognize(file, 'spa');
                        this.nuevaNota(result.data.text.trim());
                    } catch (e) {
                        alert("Error de lectura");
                    } finally {
                        this.isScanning = false;
                        event.target.value = '';
                    }
                },

                abrirNota(n) { this.notaExpandida = n; },
                cerrarNota() { this.notaExpandida = null; this.guardar(); },
                
                togglePin() { this.notaExpandida.pinned = !this.notaExpandida.pinned; this.guardar(); },
                
                toggleReminder() { 
                    this.notaExpandida.reminder = !this.notaExpandida.reminder;
                    if(this.notaExpandida.reminder && Notification.permission === "granted") {
                        new Notification("Dark Pad", { 
                            body: this.notaExpandida.texto || "Nota pendiente",
                            requireInteraction: true 
                        });
                    }
                },

                borrarNota() {
                    if(confirm("¿Borrar?")) {
                        this.notas = this.notas.filter(n => n.id !== this.notaExpandida.id);
                        this.cerrarNota();
                    }
                },

                guardar() { localStorage.setItem('darkpad_v8_bro', JSON.stringify(this.notas)); },
                get notasOrdenadas() { return [...this.notas].sort((a, b) => b.pinned - a.pinned || b.id - a.id); }
            }
        }
    </script>
</body>
</html>
